<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Preview – Event Horizon</title>
  <meta name="theme-color" content="#050504">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      font-family: 'Inter', system-ui, sans-serif;
      color: #E8E4DA;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      min-height: 100vh;
    }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #A09880;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .banner-wrapper {
      position: relative;
      width: 100%;
      max-width: 2200px;
      aspect-ratio: 2200 / 980;
      overflow: hidden;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .banner-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .banner-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px;
    }
    .banner-title {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(2rem, 5vw, 5.5rem);
      font-weight: 800;
      color: #F5F0E8;
      line-height: 1.1;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 40px rgba(0,0,0,0.6), 0 0 80px rgba(0,0,0,0.4);
      margin-bottom: 8px;
    }
    .banner-tagline {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(0.7rem, 1.5vw, 1.2rem);
      font-weight: 600;
      color: rgba(220,200,152,0.8);
      letter-spacing: 0.12em;
      text-shadow: 0 1px 20px rgba(0,0,0,0.5);
      margin-bottom: clamp(16px, 3vw, 40px);
    }
    .banner-cities {
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.55rem, 1.1vw, 0.95rem);
      font-weight: 500;
      color: rgba(200,176,128,0.7);
      letter-spacing: 0.15em;
      text-shadow: 0 1px 12px rgba(0,0,0,0.5);
    }
    .banner-dims {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Banner Preview</h1>
  <div class="banner-wrapper">
    <img src="assets/banner/banner01_2200x980.jpg" alt="Event Horizon Banner">
    <div class="banner-overlay">
      <div class="banner-title">Event<br>Horizon</div>
      <div class="banner-tagline">by Acaia</div>
      <div class="banner-cities">Dublin &middot; Tokyo &middot; Seoul &middot; Melbourne &middot; San Diego &middot; Amsterdam &middot; Osaka</div>
    </div>
  </div>
  <p class="banner-dims">2200 &times; 980 px</p>
</body>
</html>
